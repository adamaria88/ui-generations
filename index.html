<!DOCTYPE html>

<head>

<!-- ══════════════════════════════════════════════════════════════════
     UI GENERATIONS — HUB TUNGGAL (1 link buat SEMUA generate UI)
     Tiap generate UI = 1 objek di GENERATIONS, punya 6 step tetap.

     ── NAMBAH GENERATE UI BARU ──────────────────────────────────────
     Tambah 1 objek di array GENERATIONS (paling atas = paling baru):
       { slug, nama, brief, platform, updated, steps:{1..6} }

     Tiap step:
       status  : 'done' | 'aktif' | 'nunggu' | 'skip'
       file    : path relatif dari _output/ (tampil di panel pratinjau)
       ringkas : 1 kalimat — apa yang terjadi di step ini
       poin    : [{t, x}] — daftar pendek, BUKAN paragraf.
                 t = 'ok' | 'warn' | 'stop' | 'info' | 'tanya'
       link    : [{nama, url}] — tautan luar (CU, Figma, file lain)

     ⚠️ ATURAN NULIS: `poin` itu daftar yang di-scan, satu baris satu poin.
        Lebih dari ~15 kata? Potong. Panel ini buat tau "status & apa yang
        ditunggu" — bukan buat baca esai. Detail panjang taruh di file-nya.

     Pratinjau bisa dibuka/tutup (tombol atau tombol \ ). Step tanpa file
     otomatis nutup, panel info melebar.
     ══════════════════════════════════════════════════════════════════ -->
<title>UI Generations · Paper.id</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  :root{
    --app-bg:#F4F4F2; --side-bg:#E7E6E0; --bar-bg:#EDECE6; --surface:#FCFCFB; --canvas:#F4F4F2;
    --bd:rgba(0,0,0,.08); --bd-strong:rgba(0,0,0,.16);
    --tx:#1F2328; --tx-mut:#6E6E68; --tx-dim:#A3A39B;
    --accent:#1F2328; --accent-tx:#fff;
    --item-on:#EAEAE6; --item-hover:#EDEDE9;
    --shadow-sm:0 1px 2px rgba(0,0,0,.05);
    --ok:#1F7A4D; --ok-bg:#E4F2EA;
    --run:#1B5E8C; --run-bg:#E6F0F7;
    --stop:#A33A2E; --stop-bg:#F8E7E4;
    --warn:#8A6D1F; --warn-bg:#FBF3E4;
  }
  body{font-family:'Lato',-apple-system,'Segoe UI',sans-serif;display:flex;
       background:var(--app-bg);color:var(--tx);overflow:hidden}

  /* ─── SIDEBAR ─── */
  .side{width:250px;flex:none;background:var(--side-bg);border-right:1px solid var(--bd-strong);
        display:flex;flex-direction:column;z-index:40;transition:transform .22s cubic-bezier(.4,0,.2,1)}
  .side-h{padding:15px 15px 11px}
  .side-h .logo{font-size:13.5px;font-weight:900;display:flex;align-items:center;gap:8px}
  .side-h .logo svg{width:17px;height:17px;flex:none}
  .side-h .tag{font-size:11px;color:var(--tx-dim);margin-top:2px}
  .side-search{margin:0 11px 9px;display:flex;align-items:center;gap:8px;background:var(--surface);
               border:1px solid var(--bd);border-radius:8px;padding:6px 10px}
  .side-search svg{width:14px;height:14px;color:var(--tx-dim);flex:none}
  .side-search input{flex:1;border:0;background:transparent;color:var(--tx);font:400 12px 'Lato';outline:none}
  .side-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
            color:var(--tx-dim);padding:5px 17px}
  .side-list{flex:1;overflow:auto;padding:0 8px 10px}
  .gen{padding:9px 11px;border-radius:9px;cursor:pointer;margin-bottom:2px;transition:background .12s}
  .gen:hover{background:var(--item-hover)}
  .gen.on{background:var(--item-on)}
  .gen .nm{font-size:13px;font-weight:700;color:var(--tx-mut)}
  .gen.on .nm{color:var(--tx)}
  .gen .meta{font-size:10.5px;color:var(--tx-dim);margin-top:2px;display:flex;align-items:center;gap:5px}
  .plat{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
        padding:1.5px 5px;border-radius:4px;background:#E4F0EA;color:#1F6B49}
  .plat.web{background:#F0E9DC;color:#7A5A1F}
  .dots{display:flex;gap:3px;margin-top:6px}
  .dots i{width:100%;height:3px;border-radius:2px;background:#D6D5CF}
  .dots i.done{background:var(--ok)}
  .dots i.aktif{background:var(--run)}
  .side-empty{padding:18px;font-size:12px;color:var(--tx-dim);line-height:1.6}
  .side-foot{padding:10px 15px;border-top:1px solid var(--bd);font-size:11px;color:var(--tx-dim)}
  .side-foot a{color:var(--tx-mut)}

  /* ─── MAIN ─── */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .bar{display:flex;align-items:center;gap:9px;padding:8px 15px;background:var(--bar-bg);
       border-bottom:1px solid var(--bd-strong);flex:none;flex-wrap:wrap}
  .hamb{display:none;border:1px solid var(--bd-strong);background:transparent;color:var(--tx-mut);
        border-radius:8px;width:34px;height:32px;cursor:pointer;flex:none}
  .hamb svg{width:16px;height:16px}
  .bar h1{font-size:13.5px;font-weight:900}
  .bar .sub{font-size:11px;color:var(--tx-dim)}
  .bar .sp{flex:1}
  .btn{border:1px solid var(--bd-strong);background:transparent;color:var(--tx-mut);
       font:600 12px 'Lato';padding:6px 10px;border-radius:8px;cursor:pointer;
       display:inline-flex;align-items:center;gap:6px;text-decoration:none;white-space:nowrap}
  .btn svg{width:14px;height:14px;flex:none}
  .btn:hover{background:var(--item-hover);color:var(--tx)}
  .btn.on{background:var(--accent);border-color:var(--accent);color:var(--accent-tx)}
  .btn.on:hover{background:#33383E;color:var(--accent-tx)}
  .btn:disabled{opacity:.35;cursor:default}
  .btn:disabled:hover{background:transparent;color:var(--tx-mut)}
  .btn.ico{width:32px;padding:0;justify-content:center;gap:0}

  /* ─── STEP RAIL ─── */
  .rail{display:flex;padding:10px 15px 0;background:var(--bar-bg);
        border-bottom:1px solid var(--bd-strong);overflow-x:auto;flex:none}
  .rail::-webkit-scrollbar{height:0}
  .st{flex:1;min-width:118px;position:relative;padding:0 4px 10px;cursor:pointer;border:0;
      background:transparent;text-align:left;font-family:'Lato'}
  .st .line{height:3px;border-radius:2px;background:#D6D5CF;margin-bottom:7px}
  .st.done .line{background:var(--ok)}
  .st.aktif .line{background:var(--run)}
  .st.skip .line{opacity:.45}
  .st .no{font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--tx-dim)}
  .st .nm{font-size:12px;font-weight:700;color:var(--tx-mut);margin-top:1px;line-height:1.3}
  .st.cur .nm,.st.cur .no{color:var(--tx)}
  .st:hover .nm{color:var(--tx)}
  .st .flag{display:block;font-size:9.5px;font-weight:700;margin-top:4px;color:var(--tx-dim)}
  .st .flag b{color:var(--stop)}
  .st.cur::after{content:'';position:absolute;left:4px;right:4px;bottom:0;height:2px;background:var(--accent)}

  /* ─── BODY ─── */
  .body{flex:1;display:flex;min-height:0}
  .info{width:340px;flex:none;border-right:1px solid var(--bd);background:var(--surface);
        overflow-y:auto;padding:16px 18px 24px}
  .body.wide .info{width:auto;flex:1;border-right:0}
  .body.wide .info-in{max-width:880px;margin:0 auto}
  .info h2{font-size:15.5px;font-weight:900;margin-bottom:2px}
  .info .lead{font-size:11.5px;color:var(--tx-dim);margin-bottom:13px}
  .ringkas{font-size:13.5px;color:var(--tx);line-height:1.55;margin-bottom:14px}

  /* daftar poin — pengganti paragraf */
  .poin{display:flex;flex-direction:column;margin-bottom:15px}
  .body.wide .poin{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:0 20px}
  .p{display:flex;gap:9px;align-items:flex-start;padding:6px 0;font-size:12.5px;line-height:1.5}
  .p .ic{width:16px;height:16px;border-radius:4px;flex:none;margin-top:2px;
         display:flex;align-items:center;justify-content:center;font:900 10px 'Lato'}
  .p-ok .ic{background:var(--ok-bg);color:var(--ok)}
  .p-warn .ic{background:var(--warn-bg);color:var(--warn)}
  .p-stop .ic{background:var(--stop-bg);color:var(--stop)}
  .p-info .ic{background:var(--item-on);color:var(--tx-mut)}
  .p-tanya .ic{background:var(--run-bg);color:var(--run)}
  .p .tx{flex:1;color:var(--tx-mut)}
  .p .tx b{color:var(--tx)}
  .p-stop .tx b{color:var(--stop)}
  .p-tanya .tx b{color:var(--run)}
  .p code{font-size:11.5px;background:var(--item-on);padding:1px 4px;border-radius:3px}

  .k{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
     color:var(--tx-dim);margin:0 0 6px}
  .blk{margin-bottom:15px}
  .desc{font-size:12.5px;color:var(--tx-mut);line-height:1.55}
  .desc b{color:var(--tx)}
  .desc code{font-size:11.5px;background:var(--item-on);padding:1px 4px;border-radius:3px}
  .links{display:flex;flex-wrap:wrap;gap:7px}

  /* ─── STAGE ─── */
  .stage{flex:1;position:relative;background:var(--canvas);min-width:0}
  .body.wide .stage{display:none}
  .stage iframe{width:100%;height:100%;border:0;display:block;background:#fff}

  @media(max-width:1180px){ .info{width:305px} }
  @media(max-width:900px){
    .side{position:fixed;inset:0 auto 0 0;transform:translateX(-100%)}
    .side.open{transform:none}
    .hamb{display:flex;align-items:center;justify-content:center}
    .body{flex-direction:column}
    .info{width:100%;border-right:0;border-bottom:1px solid var(--bd);max-height:50%}
    .body.wide .info{max-height:none}
    .stage{min-height:280px}
    .lbl-hide{display:none}
  }
</style>
</head>

       {t:'ok',x:'<b>C — Gabungan</b>: angka di atas, progres di bawah. Dipilih'},

const LBL={done:'Selesai',aktif:'Jalan',nunggu:'Nunggu',skip:'Dilewat'};
const IC={ok:'✓',warn:'!',stop:'!',info:'·',tanya:'?'};
const ICO_OPEN='<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M15 3v18"/>';
const ICO_SHUT='<rect x="3" y="3" width="18" height="18" rx="2"/>';
const $=id=>document.getElementById(id);
let curG=0,curS=1,filt='',wantStage=true;

const stepOf=(g,n)=>g.steps[n]||{status:'nunggu'};
function firstInteresting(g){
  for(let n=1;n<=6;n++) if(stepOf(g,n).status==='aktif') return n;
  let last=1; for(let n=1;n<=6;n++) if(stepOf(g,n).status==='done') last=n;
  return last;
}
/* berapa poin yang butuh perhatian — muncul di rail biar ketauan tanpa buka */
const flagCount=d=>(d.poin||[]).filter(p=>p.t==='stop'||p.t==='tanya').length;

/* ─── SIDEBAR ─── */
function renderList(){
  const rows=GENERATIONS.map((g,i)=>({g,i}))
    .filter(({g})=>!filt||(g.nama+' '+g.brief).toLowerCase().includes(filt));
  if(!rows.length){ $('list').innerHTML='<div class="side-empty">Nggak ada yang cocok.</div>'; return }
  $('list').innerHTML=rows.map(({g,i})=>{
    const dots=[1,2,3,4,5,6].map(n=>{
      const s=stepOf(g,n).status;
      return '<i class="'+(s==='done'?'done':s==='aktif'?'aktif':'')+'"></i>';
    }).join('');
    const done=[1,2,3,4,5,6].filter(n=>stepOf(g,n).status==='done').length;
    return '<div class="gen'+(i===curG?' on':'')+'" data-i="'+i+'">'+
      '<div class="nm">'+g.nama+'</div>'+
      '<div class="meta"><span class="plat '+(g.platform==='web'?'web':'')+'">'+g.platform+'</span>'+
      '<span>'+done+'/6</span><span>·</span><span>'+g.updated+'</span></div>'+
      '<div class="dots">'+dots+'</div></div>';
  }).join('');
  $('list').querySelectorAll('.gen').forEach(el=>{
    el.onclick=()=>{ curG=+el.dataset.i; curS=firstInteresting(GENERATIONS[curG]); render() };
  });
}

/* ─── RAIL ─── */
function renderRail(){
  const g=GENERATIONS[curG];
  $('rail').innerHTML=STEPS.map(s=>{
    const d=stepOf(g,s.no), n=flagCount(d);
    return '<button class="st '+d.status+(s.no===curS?' cur':'')+'" data-n="'+s.no+'">'+
      '<div class="line"></div><div class="no">STEP '+s.no+'</div>'+
      '<div class="nm">'+s.nm+'</div>'+
      '<span class="flag">'+LBL[d.status]+(n?' · <b>'+n+' perlu dicek</b>':'')+'</span></button>';
  }).join('');
  $('rail').querySelectorAll('.st').forEach(b=>{ b.onclick=()=>{ curS=+b.dataset.n; render() } });
}

/* ─── INFO ─── */
function renderInfo(){
  const g=GENERATIONS[curG], s=STEPS[curS-1], d=stepOf(g,curS);
  let h='<h2>Step '+s.no+' — '+s.nm+'</h2><div class="lead">'+g.nama+' · '+LBL[d.status]+'</div>';

  if(curS===1) h+='<div class="ringkas">'+g.brief+'</div>';
  if(d.ringkas) h+='<div class="ringkas">'+d.ringkas+'</div>';

  if(d.poin&&d.poin.length)
    h+='<div class="poin">'+d.poin.map(p=>
      '<div class="p p-'+p.t+'"><span class="ic">'+IC[p.t]+'</span><span class="tx">'+p.x+'</span></div>'
    ).join('')+'</div>';

  const links=(d.link||[]).slice();
  if(d.file&&!links.some(l=>l.url===d.file)) links.unshift({nama:'Buka file',url:d.file});
  if(links.length)
    h+='<div class="blk"><div class="k">Tautan</div><div class="links">'+links.map(l=>
      '<a class="btn" href="'+l.url+'" target="_blank" rel="noopener">'+
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>'+
      l.nama+'</a>').join('')+'</div></div>';

  h+='<div class="blk"><div class="k">Ngapain di step ini</div><div class="desc">'+s.desc+'</div></div>';
  $('info').innerHTML=h;
}

/* ─── STAGE + TOGGLE ─── */
const stageShown=()=>!!stepOf(GENERATIONS[curG],curS).file && wantStage;
function renderStage(){
  const d=stepOf(GENERATIONS[curG],curS), show=stageShown();
  $('bd').classList.toggle('wide',!show);
  $('stage').innerHTML = show ? '<iframe src="'+d.file+'" title="Step '+curS+'"></iframe>' : '';
  const t=$('toggle');
  t.disabled=!d.file;
  t.title=d.file?'Buka/tutup pratinjau (\\)':'Step ini nggak punya file buat ditampilin';
  t.classList.toggle('on',show);
  $('tglbl').textContent=show?'Sembunyikan':'Tampilkan';
  $('tgico').innerHTML=show?ICO_OPEN:ICO_SHUT;
}

function render(){
  const g=GENERATIONS[curG], d=stepOf(g,curS);
  $('gnama').textContent=g.nama;
  $('gsub').textContent=g.platform+' · '+g.updated;
  $('prev').disabled=curS<=1; $('next').disabled=curS>=6;
  const o=$('open');
  if(d.file){ o.href=d.file; o.style.display='inline-flex' } else o.style.display='none';
  renderList(); renderRail(); renderInfo(); renderStage();
  location.hash=g.slug+'/'+curS;
  if(window.innerWidth<=900) $('side').classList.remove('open');
}

$('prev').onclick=()=>{ if(curS>1){curS--;render()} };
$('next').onclick=()=>{ if(curS<6){curS++;render()} };
$('toggle').onclick=()=>{ wantStage=!wantStage; renderStage() };
$('hamb').onclick=()=>$('side').classList.toggle('open');
$('q').oninput=e=>{ filt=e.target.value.toLowerCase().trim(); renderList() };
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowLeft'&&curS>1){curS--;render()}
  if(e.key==='ArrowRight'&&curS<6){curS++;render()}
  if(e.key==='\\'){ wantStage=!wantStage; renderStage() }
});

/* folder explorer beda nama: lokal `explorer/`, publik `component/` */
(function(){
  const a=$('lnk-explorer'); if(!a)return;
  fetch('explorer/index.html',{method:'HEAD'})
    .then(r=>{ if(!r.ok) a.href='component/index.html' })
    .catch(()=>{ a.href='component/index.html' });
})();

(function init(){
  const m=(location.hash||'').replace('#','').split('/');
  const i=GENERATIONS.findIndex(g=>g.slug===m[0]);
  if(i>=0){ curG=i; const n=+m[1]; curS=(n>=1&&n<=6)?n:firstInteresting(GENERATIONS[i]) }
  else curS=firstInteresting(GENERATIONS[0]);
  render();
})();
</script>
</body>
