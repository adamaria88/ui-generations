<!doctype html><html lang="id"><head><meta charset="utf-8">
<title>Tes Multi-Screen — Aurora</title>
<style>
  :root{
    --color-action-primary-bg:#4199d5; --color-action-primary-fg:#fff;
    --color-text-primary:#133f5d; --color-text-secondary:#718c9e;
    --color-surface-light-default:#fff; --color-surface-light-platform:#f8fbfe;
    --color-border-default:#d6dbe0; --radius-sm:4px; --radius-md:8px; --radius-full:9999px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Lato',sans-serif;background:var(--color-surface-light-platform)}
  .screen{width:480px;min-height:560px;background:var(--color-surface-light-default);
    display:flex;flex-direction:column;gap:20px;padding:32px;
    border:1px solid var(--color-border-default);border-radius:var(--radius-md)}
  .title{font-size:22px;font-weight:700;color:var(--color-text-primary)}
  .sub{font-size:14px;color:var(--color-text-secondary)}
  .card{display:flex;flex-direction:row;justify-content:space-between;align-items:center;
    gap:12px;padding:16px;border:1px solid var(--color-border-default);
    border-radius:var(--radius-md);background:var(--color-surface-light-default)}
  .card .nm{font-size:14px;font-weight:600;color:var(--color-text-primary)}
  .card .amt{font-size:14px;font-weight:700;color:var(--color-text-primary)}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;
    padding:8px 16px;border-radius:var(--radius-full);border:0;cursor:pointer;
    background:var(--color-action-primary-bg);color:var(--color-action-primary-fg);
    font-size:14px;font-weight:500;font-family:inherit}
  .row{display:flex;flex-direction:row;gap:12px;align-items:center}
  .spacer{flex:1}
  .ok{width:64px;height:64px;border-radius:var(--radius-full);
    background:var(--color-action-primary-bg);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700}
</style></head><body>

<div class="screen" data-screen="Daftar Invoice" data-flow-next="Tagih Terkirim" data-flow-label="klik Tagih">
  <div class="title">Invoice Belum Dibayar</div>
  <div class="sub">3 invoice menunggu pembayaran</div>
  <div class="card"><span class="nm">UD Sumber Rejeki</span><span class="spacer"></span><span class="amt">Rp 15.800.000</span></div>
  <div class="card"><span class="nm">CV Maju Jaya</span><span class="spacer"></span><span class="amt">Rp 8.200.000</span></div>
  <div class="card"><span class="nm">PT Sinar Abadi</span><span class="spacer"></span><span class="amt">Rp 22.000.000</span></div>
  <div class="row"><span class="spacer"></span><button class="btn">Tagih Sekarang</button></div>
</div>

<div class="screen" data-screen="Tagih Terkirim">
  <div class="ok">✓</div>
  <div class="title">Tagihan Terkirim</div>
  <div class="sub">Reminder pembayaran sudah dikirim ke UD Sumber Rejeki via WhatsApp.</div>
  <div class="card"><span class="nm">Status</span><span class="spacer"></span><span class="amt">Menunggu bayar</span></div>
  <div class="row"><span class="spacer"></span><button class="btn">Selesai</button></div>
</div>

</body></html>
