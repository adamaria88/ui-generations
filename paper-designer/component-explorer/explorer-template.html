<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ══════════════════════════════════════════════════════════════════
     COMPONENT EXPLORER — template web buat eksplorasi komponen.
     2 layer dipisah jelas:
       • LAYER TOOLING (prefix .expl-*)  = review chrome, DILARANG masuk Figma.
       • LAYER KOMPONEN (.expl-canvas)   = desain komponen, INI yang di-extract.
     Placeholder: {{COMPONENT_NAME}}, {{PHASE}}, dan slot alternatif.
     ══════════════════════════════════════════════════════════════════ -->
<title>Explorer · {{COMPONENT_NAME}}</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  /* ═══ NEUTRAL MINIMAL — token chrome (identik dgn hub + playground) ═══ */
  :root{
    --app-bg:#F4F4F2; --bar-bg:#EDECE6; --surface:#FCFCFB; --canvas:#FFFFFF;
    --bd:rgba(0,0,0,.08); --bd-strong:rgba(0,0,0,.16);
    --tx:#1F2328; --tx-mut:#6E6E68; --tx-dim:#A3A39B;
    --accent:#1F2328; --accent-tx:#fff;
    --item-on:#EAEAE6; --item-hover:#EDEDE9;
    --shadow-sm:0 1px 2px rgba(0,0,0,.05); --shadow-md:0 6px 22px rgba(0,0,0,.12); --danger:#B42318;
  }
  body { font-family:'Lato',-apple-system,'Segoe UI',sans-serif; background:var(--app-bg); color:var(--tx); }

  /* ─────────── LAYER TOOLING ─────────── */
  .expl-topbar { position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:12px;
    background:var(--bar-bg); color:var(--tx); padding:10px 20px; border-bottom:1px solid var(--bd-strong); }
  .expl-topbar h1 { font-size:15px; font-weight:700; }
  .expl-phase { font-size:11px; font-weight:600; letter-spacing:.04em; text-transform:uppercase;
    background:var(--item-on); padding:3px 10px; border-radius:99px; color:var(--tx-mut); }
  .expl-topbar .sp { flex:1; }
  .expl-btn { border:0; border-radius:8px; padding:8px 14px; font:600 13px 'Lato',sans-serif;
    cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:filter .12s,background .12s; }
  .expl-btn--ghost { background:transparent; border:1px solid var(--bd-strong); color:var(--tx-mut); }
  .expl-btn--ghost:hover { background:var(--item-hover); color:var(--tx); }
  .expl-btn--ghost.on { background:var(--accent); border-color:var(--accent); color:var(--accent-tx); }
  .expl-btn--primary { background:var(--accent); color:var(--accent-tx); }
  .expl-btn--primary:hover { background:#33383E; }

  .expl-hint { padding:10px 20px; font-size:12px; color:var(--tx-mut); background:var(--app-bg);
    border-bottom:1px solid var(--bd); }
  .expl-hint b { color:var(--tx); }
  .expl-btn svg { width:15px; height:15px; }
  /* header nama komponen = TITLE (ala Ant Design) */
  .expl-head { padding:26px 28px 2px; }
  .expl-head h1 { font-size:30px; font-weight:800; letter-spacing:-.01em; line-height:1.12; color:var(--tx); }
  .expl-head p { font-size:14px; color:var(--tx-mut); margin-top:7px; }

  /* grid alternatif */
  .expl-grid { display:flex; flex-wrap:wrap; gap:28px; padding:28px; align-items:flex-start; }
  .expl-alt { background:var(--surface); border-radius:14px; box-shadow:var(--shadow-sm);
    overflow:hidden; width:420px; border:2px solid transparent; transition:border-color .15s,box-shadow .15s; }
  .expl-alt.selected { border-color:var(--accent); box-shadow:var(--shadow-md); }

  .expl-alt-head { display:flex; align-items:center; gap:8px; padding:10px 14px;
    background:var(--app-bg); border-bottom:1px solid var(--bd); }
  .expl-alt-label { font-weight:700; font-size:13px; color:var(--tx); }
  .expl-alt-tag { font-size:11px; color:var(--tx-dim); }
  .expl-alt-head .sp { flex:1; }
  .expl-alt-act { border:1px solid var(--bd-strong); background:var(--surface); border-radius:7px; padding:5px 9px;
    font:600 11px 'Lato',sans-serif; cursor:pointer; color:var(--tx-mut); display:inline-flex; align-items:center; gap:4px;
    transition:background .12s,border-color .12s,color .12s; }
  .expl-alt-act:hover { background:var(--item-hover); border-color:var(--tx-dim); color:var(--tx); }
  .expl-alt-act.pick.on { background:var(--accent); border-color:var(--accent); color:var(--accent-tx); }

  /* CANVAS = layer komponen. Klik di sini pas mode komen = drop pin. */
  .expl-canvas { position:relative; padding:24px; min-height:120px; background:var(--canvas); }
  body.expl-comment .expl-canvas { cursor:crosshair; }

  /* pin komen */
  .expl-pin { position:absolute; z-index:40; width:26px; height:26px; border-radius:50% 50% 50% 4px;
    background:var(--accent); color:var(--accent-tx); font:700 11px/26px 'Lato',sans-serif; text-align:center;
    transform:translate(-2px,-28px); box-shadow:0 2px 8px rgba(0,0,0,.3); cursor:pointer; user-select:none; }
  /* seleksi area komen: Shift+drag = kotak · Shift+klik = titik · tanpa Shift = interaksi komponen normal */
  .expl-sel { position:absolute; z-index:60; border:1.5px dashed var(--accent); background:rgba(31,35,40,.10); border-radius:4px; pointer-events:none; }
  .expl-area { position:absolute; z-index:20; border:1.5px solid var(--accent); background:rgba(31,35,40,.06); border-radius:4px; pointer-events:none; }
  .expl-pin:hover { filter:brightness(1.6); }

  /* panel komen */
  .expl-panel { position:fixed; top:0; right:0; height:100vh; width:300px; background:var(--surface);
    border-left:1px solid var(--bd-strong); box-shadow:var(--shadow-md); z-index:60;
    display:flex; flex-direction:column; transform:translateX(300px); transition:transform .2s; }
  .expl-panel.open { transform:none; }
  .expl-panel-head { padding:14px 16px; border-bottom:1px solid var(--bd); display:flex; align-items:center; }
  .expl-panel-head h2 { font-size:14px; font-weight:700; flex:1; }
  .expl-panel-close { border:0; background:var(--item-on); border-radius:6px; width:28px; height:28px; cursor:pointer; color:var(--tx-mut); }
  .expl-list { flex:1; overflow:auto; padding:12px; }
  .expl-empty { text-align:center; color:var(--tx-dim); font-size:13px; padding:32px 12px; line-height:1.6; }
  .expl-note { background:var(--app-bg); border:1px solid var(--bd); border-radius:10px; padding:10px 12px; margin-bottom:10px; }
  .expl-note-ref { font:700 11px 'Lato',sans-serif; color:var(--tx-mut); margin-bottom:4px; }
  .expl-note-text { font-size:13px; line-height:1.5; color:var(--tx); word-break:break-word; }
  .expl-note-del { float:right; border:0; background:transparent; color:var(--tx-dim); cursor:pointer; font-size:14px; }
  .expl-note-del:hover { color:var(--danger); }
  .expl-panel-foot { padding:12px 16px; border-top:1px solid var(--bd); }

  /* popup input komen */
  .expl-pop { position:fixed; z-index:70; width:280px; background:var(--surface); border:1px solid var(--bd-strong);
    border-radius:12px; box-shadow:var(--shadow-md); padding:12px; }
  .expl-pop-ref { font:700 11px 'Lato',sans-serif; color:var(--tx-mut); margin-bottom:8px; }
  .expl-pop textarea { width:100%; min-height:70px; resize:vertical; border:1px solid var(--bd-strong);
    border-radius:8px; padding:8px 10px; font:400 13px/1.5 'Lato',sans-serif; outline:none; color:var(--tx); background:var(--canvas); }
  .expl-pop textarea:focus { border-color:var(--accent); }
  .expl-pop-acts { display:flex; gap:8px; margin-top:8px; justify-content:flex-end; }

  /* toast */
  .expl-toast { position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(10px);
    background:var(--accent); color:var(--accent-tx); font:600 12px 'Lato',sans-serif; padding:10px 18px; border-radius:99px;
    box-shadow:var(--shadow-md); z-index:80; opacity:0; pointer-events:none; transition:opacity .18s,transform .18s; }
  .expl-toast.show { opacity:1; transform:translateX(-50%); }
</style>
</head>
<body data-component="{{COMPONENT_NAME}}">

  <!-- ikon line mono (Neutral Minimal) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <g id="t-chat" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a7.5 7.5 0 01-10.9 6.7L4 20l1.8-5.1A7.5 7.5 0 1121 11.5z"/></g>
    <g id="t-list" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h12M8 12h12M8 18h12M4 6h.01M4 12h.01M4 18h.01"/></g>
    <g id="t-send" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></g>
  </defs></svg>

  <!-- ═══════ LAYER TOOLING ═══════ -->
  <div class="expl-topbar">
    <span style="font-size:11px;color:var(--tx-mut)">Shift+drag = komen area · Shift+klik = titik · ⭐/📄/🎨 = nyalin command</span>
    <span class="sp"></span>
    <button class="expl-btn expl-btn--ghost" id="expl-comment-btn"><svg viewBox="0 0 24 24"><use href="#t-chat"/></svg> Komen</button>
    <button class="expl-btn expl-btn--ghost" id="expl-list-btn"><svg viewBox="0 0 24 24"><use href="#t-list"/></svg> Daftar</button>
    <button class="expl-btn expl-btn--primary" id="expl-submit-btn"><svg viewBox="0 0 24 24"><use href="#t-send"/></svg> Submit</button>
  </div>

  <header class="expl-head">
    <h1>{{COMPONENT_NAME}}</h1>
    <p>Explore · bandingin alternatif pendekatan</p>
  </header>

  <!-- ═══════ GRID ALTERNATIF ═══════ -->
  <div class="expl-grid" id="expl-grid">

    <!-- TEMPLATE 1 ALTERNATIF (duplikat per alternatif; isi .expl-canvas = LAYER KOMPONEN) -->
    <div class="expl-alt" data-alt="A">
      <div class="expl-alt-head">
        <span class="expl-alt-label">Alt A</span>
        <span class="expl-alt-tag">— nama pendekatan</span>
        <span class="sp"></span>
        <button class="expl-alt-act pick" data-act="pick">⭐ Pilih</button>
        <button class="expl-alt-act" data-act="playground">🎛️ Playground</button>
        <button class="expl-alt-act" data-act="guideline">📄 Guideline</button>
        <button class="expl-alt-act" data-act="figma">🎨 Figma</button>
      </div>
      <div class="expl-canvas">
        <!-- ↓↓↓ LAYER KOMPONEN — desain alternatif A ditaruh di sini ↓↓↓ -->
        <div style="color:#9aa8b4;font-size:13px;text-align:center;padding:20px">component layer · Alt A</div>
        <!-- ↑↑↑ -->
      </div>
    </div>

    <div class="expl-alt" data-alt="B">
      <div class="expl-alt-head">
        <span class="expl-alt-label">Alt B</span>
        <span class="expl-alt-tag">— nama pendekatan</span>
        <span class="sp"></span>
        <button class="expl-alt-act pick" data-act="pick">⭐ Pilih</button>
        <button class="expl-alt-act" data-act="playground">🎛️ Playground</button>
        <button class="expl-alt-act" data-act="guideline">📄 Guideline</button>
        <button class="expl-alt-act" data-act="figma">🎨 Figma</button>
      </div>
      <div class="expl-canvas">
        <div style="color:#9aa8b4;font-size:13px;text-align:center;padding:20px">component layer · Alt B</div>
      </div>
    </div>

  </div>

  <!-- panel komen -->
  <div class="expl-panel" id="expl-panel">
    <div class="expl-panel-head"><h2>Komen</h2><button class="expl-panel-close" id="expl-panel-close">✕</button></div>
    <div class="expl-list" id="expl-list"></div>
    <div class="expl-panel-foot">
      <button class="expl-btn expl-btn--primary" id="expl-submit-btn2" style="width:100%;justify-content:center">📤 Submit semua komen → copy</button>
    </div>
  </div>

<script>
/* ═══════ REVIEW TOOLING (purpose-built, mirip suxc secara fungsi) ═══════ */
(function(){
  var COMPONENT = document.body.getAttribute('data-component') || 'Component';
  var KEY = 'expl:' + location.pathname;
  var notes = [];
  try { notes = JSON.parse(localStorage.getItem(KEY) || '[]'); if(!Array.isArray(notes)) notes = []; } catch(e){ notes = []; }
  function save(){ try { localStorage.setItem(KEY, JSON.stringify(notes)); } catch(e){} }

  var commentMode = false;
  var body = document.body;
  var panel = document.getElementById('expl-panel');
  var commentBtn = document.getElementById('expl-comment-btn');

  function toast(msg){
    var t = document.querySelector('.expl-toast');
    if(!t){ t = document.createElement('div'); t.className = 'expl-toast'; document.body.appendChild(t); }
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._h); t._h = setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }
  function copy(text, okMsg){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){ toast(okMsg); }, function(){ fallback(); });
    } else fallback();
    function fallback(){
      var ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta);
      ta.select(); try{ document.execCommand('copy'); toast(okMsg); }catch(e){ toast('Gagal copy — copy manual'); } ta.remove();
    }
  }

  function setComment(v){
    commentMode = v; body.classList.toggle('expl-comment', v); commentBtn.classList.toggle('on', v);
    toast(v ? 'Mode komen ON — klik area alternatif' : 'Mode komen OFF');
    if(v) setPanel(true);
  }
  function setPanel(v){ panel.classList.toggle('open', v); }

  commentBtn.onclick = function(){ setComment(!commentMode); };
  document.getElementById('expl-list-btn').onclick = function(){ setPanel(!panel.classList.contains('open')); };
  document.getElementById('expl-panel-close').onclick = function(){ setPanel(false); };
  document.addEventListener('keydown', function(e){
    if(e.key === 'c' || e.key === 'C'){ if(document.activeElement.tagName !== 'TEXTAREA') setComment(!commentMode); }
  });

  // klik canvas → drop pin + popup input
  document.querySelectorAll('.expl-canvas').forEach(function(canvas){
    // klik = pin titik · drag = pilih area kotak (ala Figma region comment)
    canvas.addEventListener('mousedown', function(e){
      if(!commentMode || !e.shiftKey) return; if(e.button) return;
      if(e.target.closest('.expl-pin,.expl-area')) return;
      e.preventDefault(); e.stopPropagation();
      var altEl = canvas.closest('.expl-alt'); var alt = altEl.getAttribute('data-alt');
      var r = canvas.getBoundingClientRect(); var sx = e.clientX - r.left, sy = e.clientY - r.top;
      var sel = document.createElement('div'); sel.className = 'expl-sel'; canvas.appendChild(sel);
      var moved = false;
      function mm(ev){ var x=ev.clientX-r.left,y=ev.clientY-r.top,l=Math.min(x,sx),t=Math.min(y,sy),w=Math.abs(x-sx),h=Math.abs(y-sy); if(w>3||h>3) moved=true; sel.style.left=l+'px'; sel.style.top=t+'px'; sel.style.width=w+'px'; sel.style.height=h+'px'; }
      function mu(ev){ document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); sel.remove();
        var sw=function(ce){ ce.stopPropagation(); ce.preventDefault(); cl(); }; function cl(){ document.removeEventListener('click',sw,true); clearTimeout(tid); } document.addEventListener('click',sw,true); var tid=setTimeout(cl,350);
        var x=ev.clientX-r.left,y=ev.clientY-r.top,l=Math.min(x,sx),t=Math.min(y,sy),w=Math.abs(x-sx),h=Math.abs(y-sy);
        var tg=document.elementFromPoint(ev.clientX,ev.clientY)||ev.target; var ref=refAt(tg);
        if(moved && (w>6||h>6)) openPop(ev.clientX, ev.clientY, { alt:alt, x:l, y:t, w:w, h:h, ref:ref });
        else openPop(ev.clientX, ev.clientY, { alt:alt, x:sx, y:sy, ref:ref });
      }
      document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
    });
  });

  function refAt(el){
    var t = (el.innerText || el.textContent || '').replace(/\s+/g,' ').trim();
    return t ? (t.length > 50 ? t.slice(0,50)+'…' : t) : '';
  }

  function openPop(cx, cy, ctx){
    document.querySelectorAll('.expl-pop').forEach(function(p){ p.remove(); });
    var pop = document.createElement('div'); pop.className = 'expl-pop';
    pop.style.left = Math.min(cx, window.innerWidth - 296) + 'px';
    pop.style.top = Math.min(cy, window.innerHeight - 160) + 'px';
    pop.innerHTML =
      '<div class="expl-pop-ref">Alt '+ctx.alt+(ctx.ref?' · "'+ctx.ref.replace(/</g,'&lt;')+'"':'')+'</div>'+
      '<textarea placeholder="Tulis catatan..."></textarea>'+
      '<div class="expl-pop-acts">'+
        '<button class="expl-btn expl-btn--ghost" style="background:var(--item-on);color:var(--tx-mut);border-color:transparent" data-x>Batal</button>'+
        '<button class="expl-btn expl-btn--primary" data-ok>Simpan</button>'+
      '</div>';
    document.body.appendChild(pop);
    var ta = pop.querySelector('textarea'); ta.focus();
    pop.querySelector('[data-x]').onclick = function(){ pop.remove(); };
    pop.querySelector('[data-ok]').onclick = function(){
      var text = ta.value.trim(); if(!text){ pop.remove(); return; }
      notes.push({ alt:ctx.alt, x:ctx.x, y:ctx.y, w:ctx.w, h:ctx.h, ref:ctx.ref, text:text, ts:Date.now() });
      save(); render(); pop.remove(); toast('Komen tersimpan');
    };
  }

  function render(){
    document.querySelectorAll('.expl-pin,.expl-area').forEach(function(p){ p.remove(); });
    notes.forEach(function(n, i){
      var canvas = document.querySelector('.expl-alt[data-alt="'+n.alt+'"] .expl-canvas');
      if(canvas){
        if(n.w && n.h){ var a = document.createElement('div'); a.className = 'expl-area';
          a.style.left = n.x+'px'; a.style.top = n.y+'px'; a.style.width = n.w+'px'; a.style.height = n.h+'px'; canvas.appendChild(a); }
        var pin = document.createElement('div'); pin.className = 'expl-pin';
        pin.style.left = n.x + 'px'; pin.style.top = n.y + 'px'; pin.textContent = i+1;
        pin.onclick = function(ev){ ev.stopPropagation(); setPanel(true); };
        canvas.appendChild(pin);
      }
    });
    var list = document.getElementById('expl-list');
    if(!notes.length){ list.innerHTML = '<div class="expl-empty">Belum ada komen.<br>Nyalain 💬 Komen lalu klik area alternatif.</div>'; return; }
    list.innerHTML = '';
    notes.forEach(function(n, i){
      var el = document.createElement('div'); el.className = 'expl-note';
      el.innerHTML =
        '<button class="expl-note-del" title="Hapus">✕</button>'+
        '<div class="expl-note-ref">#'+(i+1)+' · Alt '+n.alt+(n.ref?' · "'+n.ref.replace(/</g,'&lt;')+'"':'')+'</div>'+
        '<div class="expl-note-text">'+n.text.replace(/</g,'&lt;')+'</div>';
      el.querySelector('.expl-note-del').onclick = function(){ notes.splice(i,1); save(); render(); };
      list.appendChild(el);
    });
  }

  // SUBMIT → nyusun command text buat dipaste ke chat
  function submitComments(){
    if(!notes.length){ toast('Belum ada komen'); return; }
    var lines = ['[REVIEW] ' + COMPONENT, ''];
    notes.forEach(function(n, i){
      lines.push((i+1)+'. Alt '+n.alt+(n.w?' [area '+Math.round(n.w)+'×'+Math.round(n.h)+']':'')+(n.ref?' ("'+n.ref+'")':'')+': '+n.text);
    });
    lines.push('', '(paste ini ke chat buat lanjut diskusi)');
    copy(lines.join('\n'), '📋 '+notes.length+' komen di-copy — paste ke chat');
  }
  document.getElementById('expl-submit-btn').onclick = submitComments;
  document.getElementById('expl-submit-btn2').onclick = submitComments;

  // ACTION per alternatif → nyalin command
  document.querySelectorAll('.expl-alt-act').forEach(function(btn){
    btn.onclick = function(){
      var altEl = btn.closest('.expl-alt'); var alt = altEl.getAttribute('data-alt');
      var act = btn.getAttribute('data-act');
      if(act === 'pick'){
        document.querySelectorAll('.expl-alt').forEach(function(a){ a.classList.remove('selected'); });
        document.querySelectorAll('.expl-alt-act.pick').forEach(function(b){ b.classList.remove('on'); });
        altEl.classList.add('selected'); btn.classList.add('on');
        copy('pilih: '+COMPONENT+' — Alt '+alt, '⭐ Alt '+alt+' dipilih — command di-copy');
      } else if(act === 'playground'){
        copy('playground: '+COMPONENT+' — Alt '+alt, '🎛️ Command playground di-copy — paste ke chat');
      } else if(act === 'guideline'){
        copy('guideline: '+COMPONENT+' — Alt '+alt, '📄 Command guideline di-copy — paste ke chat');
      } else if(act === 'figma'){
        copy('figma: '+COMPONENT+' — Alt '+alt, '🎨 Command generate Figma di-copy — paste ke chat');
      }
    };
  });

  render();
})();
</script>
</body>
</html>
