  ╔══════════════════════════════════════════════════════════════════╗
  ║  KOMEN OVERLAY ala Figma — SISIPKAN BLOK INI PERSIS SEBELUM </body> ║
  ║  Self-contained. data-suxc="flow" = kanvas; "prototype" = scroll.║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<style>
body.suxc-on,body.suxc-on *{cursor:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="%23cdd8df" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></svg>') 4 4,crosshair !important}
#suxc-panel,#suxc-panel *,#suxc-nav,#suxc-nav *,.suxc-pop,.suxc-pop *{cursor:default !important}
body.suxc-on .suxc-pop,body.suxc-on .suxc-pop *{cursor:default !important}
#suxc-panel .suxc-item,#suxc-nav button,.suxc-pop button,.suxc-item-act{cursor:pointer !important}

/* ── PINS ── */
.suxc-pin{position:absolute;z-index:99998;width:28px;height:28px;border-radius:50% 50% 50% 4px;
  background:#7B61FF;color:#fff;font:700 11px/28px 'Lato',sans-serif;text-align:center;
  transform:translate(-2px,-30px);box-shadow:0 2px 8px rgba(0,0,0,.5);user-select:none;cursor:pointer;
  transition:transform .12s,box-shadow .12s}
.suxc-pin:hover{transform:translate(-2px,-32px) scale(1.08);box-shadow:0 4px 16px rgba(123,97,255,.5)}

/* ── AREA RECT ── */
.suxc-rect{position:absolute;z-index:99997;border:2px dashed #7B61FF;background:rgba(123,97,255,.07);border-radius:6px;pointer-events:none}
.suxc-rect.live{z-index:99996}

/* ── POPUP ── */
.suxc-pop{position:fixed;z-index:100000;width:340px;background:#2C2C2E;
  border:1px solid rgba(255,255,255,.10);border-radius:12px;
  box-shadow:0 12px 40px rgba(0,0,0,.65);font-family:'Lato',sans-serif;overflow:hidden}
.suxc-pop-head{display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px 8px;border-bottom:1px solid rgba(255,255,255,.07)}
.suxc-pop-title{font:600 13px 'Lato',sans-serif;color:#E5E5EA}
.suxc-pop-hacts{display:flex;align-items:center;gap:2px}
.suxc-pop-hacts button,.suxc-pop-closebtn{width:28px;height:28px;border:0;border-radius:6px;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;color:#8A8A8E;
  font-size:14px;transition:background .12s,color .12s}
.suxc-pop-hacts button:hover,.suxc-pop-closebtn:hover{background:rgba(255,255,255,.10);color:#E5E5EA}
.suxc-pop-resbtn.on{color:#30D158}
.suxc-pop-resbtn:hover{color:#30D158 !important}
.suxc-av{width:32px;height:32px;border-radius:50%;background:#7B61FF;color:#fff;
  font:700 13px/32px 'Lato',sans-serif;text-align:center;flex:none;user-select:none}
.suxc-av.sm{width:28px;height:28px;font-size:11px;line-height:28px}

/* thread */
.suxc-pop-thread{padding:12px;display:flex;gap:10px;align-items:flex-start}
.suxc-thread-msg{flex:1;min-width:0}
.suxc-thread-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.suxc-thread-user{font:600 13px 'Lato',sans-serif;color:#E5E5EA}
.suxc-thread-time{font:400 11px 'Lato',sans-serif;color:#8A8A8E;flex:1}
.suxc-thread-morebtn{width:24px;height:24px;border:0;border-radius:4px;background:transparent;
  color:#636366;font:600 14px 'Lato',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center}
.suxc-thread-morebtn:hover{background:rgba(255,255,255,.10);color:#E5E5EA}
.suxc-thread-text{font:400 13px/20px 'Lato',sans-serif;color:#E5E5EA;word-break:break-word}
.suxc-thread-editta{display:none;width:100%;box-sizing:border-box;font:400 13px/20px 'Lato',sans-serif;
  background:#3A3A3C;color:#E5E5EA;border:1px solid rgba(255,255,255,.15);border-radius:6px;
  padding:6px 8px;resize:none;min-height:48px;margin-top:4px;font-family:'Lato',sans-serif;outline:none}
.suxc-thread-editta.show{display:block}

/* reply input */
.suxc-pop-reply{padding:8px 12px 12px;border-top:1px solid rgba(255,255,255,.06)}
.suxc-reply-wrap{position:relative}
.suxc-reply-ta{width:100%;box-sizing:border-box;font:400 13px/20px 'Lato',sans-serif;
  background:#3A3A3C;color:#E5E5EA;border:1px solid rgba(255,255,255,.12);border-radius:8px;
  padding:8px 10px 32px 10px;resize:none;min-height:72px;max-height:140px;
  transition:border-color .15s;font-family:'Lato',sans-serif;outline:none}
.suxc-reply-ta::placeholder{color:#636366}
.suxc-reply-ta:focus{border-color:rgba(123,97,255,.6)}
.suxc-send-btn{position:absolute;bottom:8px;right:8px;width:26px;height:26px;border:0;
  border-radius:50%;background:#0A84FF;color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s}
.suxc-send-btn:disabled{background:transparent;color:#48484A;cursor:not-allowed}
.suxc-send-btn:not(:disabled):hover{background:#0070D1}

/* ── NAV BAR ── */
#suxc-nav{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:100001;
  display:flex;gap:4px;background:#2C2C2E;border-radius:14px;padding:6px;
  box-shadow:0 8px 32px rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.08)}
#suxc-nav button{position:relative;width:40px;height:40px;border:0;border-radius:10px;background:transparent;
  color:#98989D;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s}
#suxc-nav button:hover{background:rgba(255,255,255,.10);color:#E5E5EA}
#suxc-nav button:disabled{opacity:.3;cursor:not-allowed}
#suxc-nav button[data-tip]:hover:after{content:attr(data-tip);position:absolute;bottom:50px;left:50%;
  transform:translateX(-50%);background:#1C1C1E;color:#E5E5EA;font:600 11px 'Lato',sans-serif;
  padding:5px 10px;border-radius:6px;white-space:nowrap;pointer-events:none;
  border:1px solid rgba(255,255,255,.10)}
#suxc-nav button.on{background:rgba(123,97,255,.22);color:#9B8AFF}
#suxc-nav .sep{width:1px;align-self:stretch;background:rgba(255,255,255,.10);margin:3px 2px}
#suxc-cbadge{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;border-radius:9999px;
  background:#FF3B30;color:#fff;font:700 10px/16px 'Lato',sans-serif;text-align:center;
  padding:0 3px;border:2px solid #2C2C2E}

/* ── FAB ── */
#suxc-fab{position:fixed;right:24px;bottom:24px;z-index:100001;width:50px;height:50px;
  border-radius:50%;background:#2C2C2E;color:#E5E5EA;border:1px solid rgba(255,255,255,.12);
  cursor:grab;display:none;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(0,0,0,.45);touch-action:none;user-select:none;transition:background .12s}
#suxc-fab.show{display:flex}
#suxc-fab.drag{cursor:grabbing}
#suxc-fab:hover{background:#3A3A3C}
#suxc-fbadge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;border-radius:9999px;
  background:#FF3B30;color:#fff;font:700 11px/18px 'Lato',sans-serif;text-align:center;
  padding:0 4px;display:none;border:2px solid #2C2C2E}
#suxc-nav.suxc-asmenu{left:auto;right:auto;bottom:auto;top:auto;transform:none}

/* ── FLOW canvas ── */
html.suxc-flow,body.suxc-flow{margin:0;height:100%;overflow:hidden}
#suxc-stage{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;min-width:100vw;box-sizing:border-box;padding:40px}
body.suxc-on{outline:2px solid rgba(123,97,255,.4);outline-offset:-2px}
body.suxc-pan,body.suxc-pan *{cursor:grabbing !important}

/* ── TOAST ── */
#suxc-toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(10px);
  background:#1C1C1E;color:#E5E5EA;font:600 12px 'Lato',sans-serif;padding:9px 16px;
  border-radius:9999px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:100002;opacity:0;
  pointer-events:none;transition:opacity .15s,transform .15s;border:1px solid rgba(255,255,255,.1)}
#suxc-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ZOOM ── */
#suxc-zoom{position:fixed;left:16px;bottom:18px;z-index:100001;display:flex;gap:4px;
  background:#2C2C2E;border-radius:10px;padding:5px;box-shadow:0 8px 24px rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.08)}
#suxc-zoom button{width:32px;height:32px;border:0;border-radius:7px;background:transparent;
  color:#98989D;font:700 14px 'Lato',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center}
#suxc-zoom button:hover{background:rgba(255,255,255,.10);color:#E5E5EA}
#suxc-zoom span{min-width:44px;text-align:center;align-self:center;color:#636366;font:600 11px 'Lato',sans-serif}

/* ── PANEL ── */
#suxc-panel{position:fixed;top:0;right:0;height:100vh;width:240px;background:#1C1C1E;
  border-left:1px solid rgba(255,255,255,.08);box-shadow:-6px 0 24px rgba(0,0,0,.4);
  z-index:99999;font-family:'Lato',sans-serif;display:flex;flex-direction:column;
  transition:transform .2s ease}
#suxc-panel.closed{transform:translateX(240px)}
#suxc-ph{padding:12px;border-bottom:1px solid rgba(255,255,255,.08)}
#suxc-ph-title{font:700 13px 'Lato',sans-serif;color:#E5E5EA;padding:2px 0 10px;
  display:flex;align-items:center;justify-content:space-between}
#suxc-ph-title span{font:400 12px 'Lato',sans-serif;color:#636366}
#suxc-search-row{display:flex;gap:6px;align-items:center}
#suxc-search-wrap{flex:1;display:flex;align-items:center;gap:7px;background:#3A3A3C;
  border-radius:8px;padding:7px 10px}
#suxc-search-wrap svg{color:#8A8A8E;flex:none}
#suxc-search-input{flex:1;border:0;background:transparent;color:#E5E5EA;
  font:400 13px 'Lato',sans-serif;outline:none}
#suxc-search-input::placeholder{color:#636366}
#suxc-close{width:34px;height:34px;border:0;border-radius:8px;background:#3A3A3C;
  color:#8A8A8E;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:background .12s}
#suxc-close:hover{background:#4A4A4E;color:#E5E5EA}
#suxc-list{flex:1;overflow:auto;padding:8px}
#suxc-empty{padding:32px 16px;color:#636366;font:400 13px/20px 'Lato',sans-serif;text-align:center}

/* panel cards */
.suxc-item{padding:12px;border-radius:10px;margin-bottom:6px;cursor:pointer;
  background:#2C2C2E;border:1px solid transparent;transition:border-color .12s,background .12s}
.suxc-item:hover{border-color:rgba(255,255,255,.10)}
.suxc-item.active{background:#3D3D5C;border-color:rgba(123,97,255,.4)}
.suxc-item.resolved{opacity:.48}
.suxc-item-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.suxc-item-acts{display:flex;gap:4px}
.suxc-item-act{width:32px;height:32px;border:0;border-radius:7px;background:transparent;
  color:#636366;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:background .12s,color .12s}
.suxc-item-act:hover{background:rgba(255,255,255,.10);color:#E5E5EA}
.suxc-item-act.ok.on{color:#30D158}
.suxc-item-act.ok:hover{color:#30D158}
.suxc-item-act.del:hover{color:#FF453A}
.suxc-item-ref{font:400 11px 'Lato',sans-serif;color:#636366;align-self:center}
.suxc-item-who{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.suxc-item-name{font:600 12px 'Lato',sans-serif;color:#E5E5EA}
.suxc-item-time{font:400 11px 'Lato',sans-serif;color:#636366}
.suxc-item-text{font:400 12px/18px 'Lato',sans-serif;color:#98989D;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.suxc-item.resolved .suxc-item-text{text-decoration:line-through}
</style>

<div id="suxc-nav">
  <button id="suxc-tgl" type="button" data-tip="Mode komen (C)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></svg>
    <span id="suxc-cbadge" style="display:none">0</span>
  </button>
  <button id="suxc-tab" type="button" data-tip="Daftar komen (L)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
  </button>
  <span class="sep"></span>
  <button id="suxc-submit" type="button" data-tip="Submit komen — copy (S)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
  </button>
  <span class="sep"></span>
  <button id="suxc-figma" type="button" data-tip="Generate Figma (G)">
    <svg width="16" height="16" viewBox="0 0 38 57" fill="currentColor"><path d="M19 28.5a9.5 9.5 0 1 1 19 0 9.5 9.5 0 0 1-19 0z"/><path d="M0 47.5A9.5 9.5 0 0 1 9.5 38H19v9.5a9.5 9.5 0 1 1-19 0z"/><path d="M19 0v19h9.5a9.5 9.5 0 1 0 0-19H19z"/><path d="M0 9.5A9.5 9.5 0 0 0 9.5 19H19V0H9.5A9.5 9.5 0 0 0 0 9.5z"/><path d="M0 28.5A9.5 9.5 0 0 0 9.5 38H19V19H9.5A9.5 9.5 0 0 0 0 28.5z"/></svg>
  </button>
</div>

<div id="suxc-panel" class="closed">
  <div id="suxc-ph">
    <div id="suxc-ph-title">Comments <span id="suxc-count"></span></div>
    <div id="suxc-search-row">
      <div id="suxc-search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="suxc-search-input" placeholder="Search" type="text">
      </div>
      <button id="suxc-close">✕</button>
    </div>
  </div>
  <div id="suxc-list"></div>
</div>

<div id="suxc-zoom">
  <button id="suxc-zout" type="button">−</button>
  <span id="suxc-zlvl">100%</span>
  <button id="suxc-zin" type="button">+</button>
  <button id="suxc-zfit" type="button">⤢</button>
</div>

<button id="suxc-fab" type="button" aria-label="Tools review">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></svg>
  <span id="suxc-fbadge">0</span>
</button>

<script>
(function(){
  var MODE=(document.body.getAttribute('data-suxc')||'prototype').toLowerCase();
  var FLOW=(MODE==='flow');
  var KEY='suxc:'+location.pathname, on=false, data=[];
  var UNAME='Working', UINIT='W';
  try{data=JSON.parse(localStorage.getItem(KEY)||'[]');if(!Array.isArray(data))data=[];}
  catch(e){data=[];try{localStorage.removeItem(KEY);}catch(_){}}

  var panel=document.getElementById('suxc-panel'),
      tab=document.getElementById('suxc-tab'),
      tgl=document.getElementById('suxc-tgl'),
      badge=document.getElementById('suxc-cbadge'),
      nav=document.getElementById('suxc-nav'),
      fab=document.getElementById('suxc-fab'),
      searchInput=document.getElementById('suxc-search-input');

  function save(){try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}}
  var LOGKEY='suxc:log';
  function logEvent(c,act){try{
    var L=JSON.parse(localStorage.getItem(LOGKEY)||'[]');if(!Array.isArray(L))L=[];
    L.push({t:new Date().toISOString(),file:(location.pathname.split('/').pop()||''),
      act:act,text:(c.text||''),loc:(c.ctx||''),x:Math.round(c.x),y:Math.round(c.y),area:!!(c.w&&c.h)});
    localStorage.setItem(LOGKEY,JSON.stringify(L));}catch(e){}}
  window.suxcDownloadLog=function(){
    var blob=new Blob([localStorage.getItem(LOGKEY)||'[]'],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='comment-log.json';document.body.appendChild(a);a.click();a.remove();};

  var toastT;
  function toast(msg){
    var el=document.getElementById('suxc-toast');
    if(!el){el=document.createElement('div');el.id='suxc-toast';document.body.appendChild(el);}
    el.textContent=msg;el.classList.add('show');
    clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('show');},2200);}

  function fmtFull(ts){
    if(!ts)return'';
    var d=new Date(ts),z=function(n){return n<10?'0'+n:''+n;};
    return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate())+
      ' '+z(d.getHours())+':'+z(d.getMinutes())+':'+z(d.getSeconds());}

  function fmtRel(ts){
    if(!ts)return'';
    var d=Date.now()-ts;
    if(d<60000)return'Just now';
    if(d<3600000)return Math.floor(d/60000)+'m ago';
    if(d<86400000)return Math.floor(d/3600000)+'h ago';
    return Math.floor(d/86400000)+'d ago';}

  var stage,T={x:0,y:0,s:1},spaceDown=false;
  if(FLOW){
    document.documentElement.classList.add('suxc-flow');
    document.body.classList.add('suxc-flow');
    stage=document.createElement('div');stage.id='suxc-stage';
    (function(){var ns=[].slice.call(document.body.childNodes);
      ns.forEach(function(n){
        if(n.nodeType===1){var id=n.id||'',tg=n.tagName;
          if(id.indexOf('suxc-')===0||tg==='SCRIPT'||tg==='STYLE'||tg==='LINK')return;}
        else if(n.nodeType!==3)return;
        stage.appendChild(n);});
      document.body.appendChild(stage);})();
  }else{stage=document.body;}

  function applyT(){if(!FLOW)return;
    stage.style.transform='translate('+T.x+'px,'+T.y+'px) scale('+T.s+')';
    var z=document.getElementById('suxc-zlvl');if(z)z.textContent=Math.round(T.s*100)+'%';}
  function scX(){return window.scrollX||window.pageXOffset||0;}
  function scY(){return window.scrollY||window.pageYOffset||0;}
  function toLocal(cx,cy){return FLOW?{x:(cx-T.x)/T.s,y:(cy-T.y)/T.s}:{x:cx+scX(),y:cy+scY()};}
  function toClient(lx,ly){return FLOW?{x:T.x+lx*T.s,y:T.y+ly*T.s}:{x:lx-scX(),y:ly-scY()};}
  function clamp(v,a,b){return v<a?a:v>b?b:v;}
  function zoomAt(cx,cy,ns){ns=clamp(ns,0.2,3);var L=toLocal(cx,cy);T.s=ns;T.x=cx-L.x*ns;T.y=cy-L.y*ns;applyT();}
  function smooth(fn){stage.style.transition='transform .22s ease';fn();setTimeout(function(){stage.style.transition='';},240);}
  function panTo(c){
    if(!FLOW){window.scrollTo({left:Math.max(0,c.x-120),top:Math.max(0,c.y-160),behavior:'smooth'});return;}
    smooth(function(){T.x=window.innerWidth/2-(c.x+(c.w||0)/2)*T.s;T.y=window.innerHeight/2-(c.y+(c.h||0)/2)*T.s;applyT();});}
  function setOn(v){on=v;document.body.classList.toggle('suxc-on',on);tgl.classList.toggle('on',on);if(on)setPanel(true);else clearRects();}
  function setPanel(o){panel.classList.toggle('closed',!o);}
  tgl.onclick=function(){setOn(!on);};
  tab.onclick=function(){setPanel(panel.classList.contains('closed'));};
  document.getElementById('suxc-close').onclick=function(){setPanel(false);};

  function clearRects(){document.querySelectorAll('.suxc-rect:not(.live)').forEach(function(e){e.remove();});}
  function showRect(c){clearRects();if(!(c.w&&c.h))return;

  function extractTree(rootEl){

      var sl=pe?pe.scrollLeft:0,st2=pe?pe.scrollTop:0,px=pr?pr.left:0,py=pr?pr.top:0;

        var hasPad=pl>0||pt>0||prr>0||pb>0,hasBg=cs.backgroundColor!=='rgba(0, 0, 0, 0)'&&cs.backgroundColor!=='transparent';

  function buildFigmaPayload(){

      var names=screens.map(function(e){return e.getAttribute('data-screen')||'screen';});
      var trees=[],edges=[],hasExplicit=false;
      screens.forEach(function(e,i){var t=extractTree(e);if(t){t.name=names[i];trees.push({name:names[i],tree:t});}

        if(nx){hasExplicit=true;nx.split(',').forEach(function(to){to=to.trim();if(to)edges.push({from:names[i],to:to,label:e.getAttribute('data-flow-label')||''});});}});
      if(!hasExplicit)for(var i=0;i<trees.length-1;i++)edges.push({from:trees[i].name,to:trees[i+1].name,label:''});
      return{type:'FLOW',name:(location.pathname.split('/').pop()||'flow').replace(/\.html?$/i,''),screens:trees,edges:edges};}

  function doFigma(){
    var chrome=[];
    ['suxc-nav','suxc-panel','suxc-zoom','suxc-toast','suxc-fab'].forEach(function(id){var e=document.getElementById(id);if(e)chrome.push(e);});
    [].forEach.call(document.querySelectorAll('.suxc-pin,.suxc-rect,.suxc-pop'),function(e){chrome.push(e);});
    var prev=chrome.map(function(e){return e.style.display;});
    chrome.forEach(function(e){e.style.display='none';});
    var hadOn=document.body.classList.contains('suxc-on');if(hadOn)document.body.classList.remove('suxc-on');
    function restore(){chrome.forEach(function(e,i){e.style.display=prev[i];});if(hadOn)document.body.classList.add('suxc-on');}
    var pT,pTs;
    if(FLOW){pT=stage.style.transform;pTs=stage.style.transition;stage.style.transition='none';stage.style.transform='none';void stage.offsetWidth;}
    var payload;try{payload=buildFigmaPayload();}catch(e){payload=null;}
    if(FLOW){stage.style.transform=pT;stage.style.transition=pTs;}
    if(!payload){restore();toast('Gagal ekstrak — konten kosong');return;}
    function cnt(n){if(!n)return 0;var c=1;(n.children||[]).forEach(function(k){c+=cnt(k);});return c;}
    var total,extra;
    if(payload.type==='FLOW'){total=payload.screens.reduce(function(a,s){return a+cnt(s.tree);},0);extra=payload.screens.length+' screen + '+payload.edges.length+' panah';}
    else{total=cnt(payload);extra='1 screen';}
    var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    var name=(location.pathname.split('/').pop()||'ui').replace(/\.html?$/i,'')+'.figma.json';
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;
    document.body.appendChild(a);a.click();a.remove();
    restore();toast(total+' layer · '+extra+' → '+name+' · overlay balik ✓');}
  window.suxcGenerateFigma=doFigma;
  document.getElementById('suxc-figma').onclick=doFigma;

  // ── FAB (prototype) ──
  var navOpen=false;
  function placeNav(){
    nav.classList.add('suxc-asmenu');nav.style.display='flex';nav.style.left='-9999px';nav.style.top='0px';
    var nw=nav.offsetWidth,nh=nav.offsetHeight,fr=fab.getBoundingClientRect();
    var L=fr.right-nw;if(L<8)L=8;if(L+nw>window.innerWidth-8)L=window.innerWidth-8-nw;
    var Tp=fr.top-nh-12;if(Tp<8)Tp=fr.bottom+12;if(Tp+nh>window.innerHeight-8)Tp=Math.max(8,window.innerHeight-8-nh);
    nav.style.left=L+'px';nav.style.top=Tp+'px';}
  function showNav(){placeNav();navOpen=true;}
  function hideNav(){nav.style.display='none';navOpen=false;}
  function setupFab(){
    var zoomEl=document.getElementById('suxc-zoom');if(zoomEl)zoomEl.style.display='none';
    nav.style.display='none';fab.classList.add('show');
    try{var fp=JSON.parse(localStorage.getItem('suxc:fab')||'null');}catch(e){fp=null;}
    if(fp&&typeof fp.l==='number'){fab.style.left=fp.l+'px';fab.style.top=fp.t+'px';fab.style.right='auto';fab.style.bottom='auto';}
    fab.addEventListener('mousedown',function(ev){
      if(ev.button!==0)return;ev.preventDefault();
      var sx=ev.clientX,sy=ev.clientY,fr=fab.getBoundingClientRect(),ox=ev.clientX-fr.left,oy=ev.clientY-fr.top,moved=false;
      function mm(e){if(!moved&&Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>4){moved=true;fab.classList.add('drag');}
        if(moved){var l=Math.min(Math.max(4,e.clientX-ox),window.innerWidth-fab.offsetWidth-4);var t=Math.min(Math.max(4,e.clientY-oy),window.innerHeight-fab.offsetHeight-4);fab.style.left=l+'px';fab.style.top=t+'px';fab.style.right='auto';fab.style.bottom='auto';if(navOpen)placeNav();}}
      function mu(){document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);fab.classList.remove('drag');
        if(moved){var f2=fab.getBoundingClientRect();try{localStorage.setItem('suxc:fab',JSON.stringify({l:Math.round(f2.left),t:Math.round(f2.top)}));}catch(e){}}
        else{navOpen?hideNav():showNav();}}
      document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
    nav.addEventListener('click',function(ev){if(ev.target.closest&&ev.target.closest('button'))setTimeout(hideNav,0);});
    document.addEventListener('mousedown',function(ev){if(navOpen&&ev.target.closest&&!ev.target.closest('#suxc-nav')&&!ev.target.closest('#suxc-fab'))hideNav();},true);}
  if(!FLOW)setupFab();
  applyT();render();
})();
</script>
