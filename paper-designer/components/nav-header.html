<!--
  ============================================================
  NAVIGATION HEADER COMPONENT — Paper.id (Production-accurate)
  ============================================================
  Source of truth untuk navigation header di semua halaman prototype.
  Diambil dari production screenshot 2026-05-19.

  CARA PAKAI:
  1. Copy CSS ke dalam <style> halaman
  2. Copy HTML ke dalam .right-panel (sebelum .main-area)
  3. Sesuaikan: company name, verified status, company ID, username
  ============================================================
-->

<!-- ======================== CSS ======================== -->
<style>
/* ── Zone 2+3 Right Panel ── */
.right-panel { flex: 1; display: flex; flex-direction: column; height: 100vh; min-width: 0; }

/* ── Zone 2: Navigation Header ── */
.nav-header {
  background: var(--color-surface-light-default);
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
  gap: var(--spacing-sm);
}
.nav-header__left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.nav-header__company-name {
  display: flex;
  align-items: center;
  gap: var(--spacing-xs);
  font-size: 14px;
  font-weight: 700;
  color: var(--color-text-primary);
  cursor: pointer;
  user-select: none;
}
.nav-header__company-name:hover { opacity: 0.8; }
.nav-header__company-id {
  font-size: 12px;
  font-weight: 400;
  color: var(--color-text-secondary);
  line-height: 18px;
}
.nav-header__right {
  display: flex;
  align-items: center;
  gap: 2px;
}
.nav-header__btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  height: 34px;
  padding: 0 8px;
  border: none;
  background: transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--text-body-font-family);
  font-size: 13px;
  font-weight: 400;
  color: var(--color-text-primary);
  white-space: nowrap;
  transition: background var(--speed-fast) var(--ease-out-regular);
}
.nav-header__btn:hover { background: var(--color-light-grey-15); }
.nav-header__btn:focus-visible { outline: 2px solid var(--color-focus-ring); outline-offset: 2px; }
.nav-header__btn-icon {
  width: 20px; height: 20px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.nav-header__chevron {
  width: 14px; height: 14px; color: var(--color-text-secondary); flex-shrink: 0;
}
.nav-header__notif { position: relative; padding: 0 8px; }
.nav-header__notif-badge {
  position: absolute; top: 2px; right: 2px;
  min-width: 16px; height: 16px;
  background: var(--color-light-red-50); color: #fff;
  font-size: 10px; font-weight: 700; border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center; padding: 0 3px;
  pointer-events: none;
}
.nav-header__avatar {
  width: 22px; height: 22px; border-radius: var(--radius-full);
  background: var(--color-light-brand-50); color: #fff;
  font-size: 9px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.nav-header__divider {
  width: 1px; height: 20px; background: var(--color-border-default);
  margin: 0 4px; flex-shrink: 0;
}
</style>

<!-- ======================== HTML ======================== -->
<header class="nav-header">
  <!-- Left: Company info -->
  <div class="nav-header__left">
    <div class="nav-header__company-name">
      Alpanex Store
      <!-- Blue verified check icon -->
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.33L2.67 3.67V7.33C2.67 11 5.2 14.47 8 15.33C10.8 14.47 13.33 11 13.33 7.33V3.67L8 1.33Z" fill="#4199d5"/>
        <path d="M6.33 9.47L4.87 8L4 8.87L6.33 11.2L12 5.53L11.13 4.67L6.33 9.47Z" fill="white"/>
      </svg>
      <svg class="nav-header__chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3.5 5.5L7 9L10.5 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="nav-header__company-id">ID Perusahaan: 64FVUL</div>
  </div>

  <!-- Right: Actions -->
  <div class="nav-header__right">
    <!-- Notification bell with badge -->
    <button class="nav-header__btn nav-header__notif" title="Notifikasi">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 3a6 6 0 00-6 6v4l-2 2.5h16L18 13V9a6 6 0 00-6-6z" stroke="#133f5d" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M9.5 19a2.5 2.5 0 005 0" stroke="#133f5d" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="nav-header__notif-badge">3</span>
    </button>
    <div class="nav-header__divider"></div>
    <!-- ID dropdown -->
    <button class="nav-header__btn">
      ID
      <svg class="nav-header__chevron" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 5.5L7 9L10.5 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <!-- Paper Plus -->
    <button class="nav-header__btn">
      <span class="nav-header__btn-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </span>
      Paper Plus
      <svg class="nav-header__chevron" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 5.5L7 9L10.5 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <!-- Username with avatar -->
    <button class="nav-header__btn">
      <span class="nav-header__avatar">AA</span>
      Adam aria maqfira
      <svg class="nav-header__chevron" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 5.5L7 9L10.5 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <!-- Bantuan -->
    <button class="nav-header__btn">
      Bantuan
      <svg class="nav-header__chevron" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 5.5L7 9L10.5 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <!-- Settings gear -->
    <button class="nav-header__btn" title="Pengaturan">
      <span class="nav-header__btn-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="#133f5d" stroke-width="1.5"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06A1.65 1.65 0 0015 19.4a1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="#133f5d" stroke-width="1.5"/>
        </svg>
      </span>
    </button>
  </div>
</header>
