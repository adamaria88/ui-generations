     - Tambah class "expanded" pada .sidemenu__item parent
     - Tambah class "open" pada .sidemenu__submenu yang sesuai
     - Tambah class "active" pada .sidemenu__subitem yang aktif
  ============================================================

<!-- ======================== CSS ======================== -->
<!--
  CATATAN: CSS di bawah membutuhkan design tokens berikut sudah didefinisikan di :root:
  --spacing-xs, --spacing-sm, --spacing-md, --spacing-lg, --spacing-xl
  --radius-sm, --radius-md, --radius-full
  --text-body-font-family, --text-body-size-sm, --text-body-size-md
  --text-body-line-height-sm
  --text-body-weight-regular, --text-body-weight-semibold, --text-body-weight-bold
  --text-heading-font-family
  --color-neutral-white, --color-light-brand-40, --color-light-brand-50
  --speed-fast, --ease-out-regular
-->
<style>
/* ── Zone 1: Sidemenu (Fixed, 240px) — gradient bg per Figma Paperverse 1.0 ── */
.sidemenu {
  width: 240px;
  min-width: 240px;
  height: 100vh;
  background: linear-gradient(to bottom, #0b2835, #206a9c 76.563%, #257ab4);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
  position: relative;
}
.sidemenu__logo {
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.sidemenu__logo img,
.sidemenu__logo svg {
  height: 42px;
  width: auto;
}
/* PaperPlus promo widget — per Figma node 7112:4050 */
.sidemenu__promo {
  margin: 0 var(--spacing-lg);
  margin-bottom: var(--spacing-lg);
  border: 1px solid #eaedef;
  border-radius: var(--radius-sm);
  overflow: hidden;
  position: relative;
  background: linear-gradient(165deg, rgba(255, 255, 255, 0.5) 0%, rgba(153, 153, 153, 0) 48%);
  flex-shrink: 0;
}
.sidemenu__promo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 34px;
  padding: 0 var(--spacing-sm);
  font-size: var(--text-body-size-sm);
  line-height: 18px;
  color: var(--color-neutral-white);
}
.sidemenu__promo-free {
  font-weight: var(--text-body-weight-semibold);
  white-space: nowrap;
}
.sidemenu__promo-upgrade {
  display: flex;
  align-items: center;
  gap: var(--spacing-xs);
  justify-content: flex-end;
}
.sidemenu__promo-upgrade span {
  white-space: nowrap;
}
.sidemenu__promo-logo {
  height: 8px;
  width: auto;
  display: inline-block;
  vertical-align: middle;
}
.sidemenu__promo-info-icon {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  opacity: 0.7;
  cursor: pointer;
}
.sidemenu__promo-divider {
  height: 1px;
  background: rgba(255, 255, 255, 0.15);
  margin: 0;
}
.sidemenu__promo-meterai {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 34px;
  padding: 0 var(--spacing-sm);
  font-size: var(--text-body-size-sm);
  line-height: 18px;
  color: var(--color-neutral-white);
}
.sidemenu__promo-meterai-label {
  font-weight: var(--text-body-weight-semibold);
}
.sidemenu__promo-meterai-value {
  font-weight: var(--text-body-weight-regular);
  text-align: right;
}
.sidemenu__promo-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 30px;
  padding: 0 var(--spacing-sm);
  background: rgba(255, 255, 255, 0.3);
  cursor: pointer;
  font-size: var(--text-body-size-sm);
  font-weight: var(--text-body-weight-semibold);
  line-height: 18px;
  color: var(--color-neutral-white);
}
.sidemenu__promo-footer:hover {
  background: rgba(255, 255, 255, 0.4);
}
.sidemenu__promo-footer-left {
  display: flex;
  align-items: center;
  gap: var(--spacing-xs);
}
/* Decorative stars at bottom of sidemenu */
.sidemenu__decor {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  pointer-events: none;
  overflow: hidden;
  opacity: 0.15;
}
.sidemenu__nav {
  display: flex;
  flex-direction: column;
  flex: 1;
}
.sidemenu__item {
  display: flex;
  align-items: center;
  gap: var(--spacing-md);
  height: 44px;
  padding: 0 var(--spacing-lg);
  color: rgba(255, 255, 255, 0.85);
  text-decoration: none;
  cursor: pointer;
  font-size: var(--text-body-size-md);
  font-weight: var(--text-body-weight-regular);
  transition: background var(--speed-fast) var(--ease-out-regular), color var(--speed-fast) var(--ease-out-regular);
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  font-family: var(--text-body-font-family);
}
.sidemenu__item:hover {
  background: rgba(255, 255, 255, 0.1);
  color: var(--color-neutral-white);
}
.sidemenu__item.active {
  background: rgba(255, 255, 255, 0.1);
  color: var(--color-neutral-white);
  font-weight: var(--text-body-weight-semibold);
}
.sidemenu__item-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sidemenu__item-arrow {
  width: 16px;
  height: 16px;
  margin-left: auto;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform var(--speed-fast) var(--ease-out-regular);
  opacity: 0.5;
}
.sidemenu__item.expanded .sidemenu__item-arrow {
  transform: rotate(90deg);
}
.sidemenu__submenu {
  display: flex;
  flex-direction: column;
  max-height: 0;
  overflow: hidden;
}
.sidemenu__submenu.open {
  max-height: none;
  overflow: visible;
}
.sidemenu__subitem {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  height: 40px;
  flex-shrink: 0;
  padding: 0 var(--spacing-xl);
  padding-left: 52px;
  color: rgba(255, 255, 255, 0.6);
  font-size: var(--text-body-size-md);
  font-weight: var(--text-body-weight-regular);
  cursor: pointer;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  font-family: var(--text-body-font-family);
  transition: background var(--speed-fast) var(--ease-out-regular), color var(--speed-fast) var(--ease-out-regular);
}
/* Lainnya submenu: sejajar dengan parent, pakai icon 20px */
#submenu-lainnya .sidemenu__subitem {
  padding: 0 var(--spacing-lg);
  gap: var(--spacing-md);
}
.sidemenu__subitem-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sidemenu__subitem:hover {
  background: rgba(255, 255, 255, 0.1);
  color: var(--color-neutral-white);
}
.sidemenu__subitem.active {
  color: var(--color-light-brand-50);
  font-weight: var(--text-body-weight-semibold);
}
.sidemenu__separator {
  height: 1px;
  background: rgba(255, 255, 255, 0.1);
  margin: var(--spacing-sm) var(--spacing-lg);
}
</style>

<!-- ======================== JavaScript ======================== -->
<script>
var SUBMENU_TRANSITION = 'max-height 500ms cubic-bezier(0.22, 0.61, 0.36, 1)';

function toggleSubmenu(menuId) {
  var btn = document.querySelector('[data-menu="' + menuId + '"]');
  var submenu = document.getElementById('submenu-' + menuId);
  if (!btn || !submenu) return;
  var isOpen = submenu.classList.contains('open');
  if (isOpen) {
    // Close: set current height, then animate to 0
    submenu.style.overflow = 'hidden';
    submenu.style.maxHeight = submenu.scrollHeight + 'px';
    submenu.style.transition = SUBMENU_TRANSITION;
    requestAnimationFrame(function() {
      submenu.style.maxHeight = '0';
    });
    btn.classList.remove('expanded');
    submenu.addEventListener('transitionend', function() {
      submenu.classList.remove('open');
      submenu.style.cssText = '';
    }, { once: true });
  } else {
    // Open: show first, then animate from 0 to scrollHeight
    submenu.classList.add('open');
    btn.classList.add('expanded');
    submenu.style.overflow = 'hidden';
    submenu.style.maxHeight = '0';
    submenu.style.transition = SUBMENU_TRANSITION;
    requestAnimationFrame(function() {
      submenu.style.maxHeight = submenu.scrollHeight + 'px';
    });
    submenu.addEventListener('transitionend', function() {
      submenu.style.cssText = '';
    }, { once: true });
  }
}
</script>
